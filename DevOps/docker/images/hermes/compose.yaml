services:
  hermes:
    image: nousresearch/hermes-agent:v2026.7.7.2
    container_name: hermes
    restart: unless-stopped
    command: gateway run

    ports:
      - "9119:9119"

    volumes:
      - ${USERPROFILE}/docker/volumes/hermes-data:/opt/data

    environment:
      HERMES_DASHBOARD: "1"

      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "${HERMES_DASHBOARD_USER}"
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "${HERMES_DASHBOARD_PASSWORD}"
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: "${HERMES_DASHBOARD_SECRET}"

      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"